<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas AR - Sistema de Procesamiento con IA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Facturas AR</h1>
            <p>Sistema de procesamiento con IA (Gemini 2.5 Flash)</p>
        </header>

        <nav>
            <button class="btn active" onclick="showTab('dashboard')">Dashboard</button>
            <button class="btn" onclick="showTab('upload')">Subir Factura</button>
            <button class="btn" onclick="showTab('manual')">Carga Manual</button>
            <button class="btn" onclick="showTab('invoices')">Mis Facturas</button>
        </nav>

        <div id="dashboard" class="tab active">
            <div class="stats">
                <div class="stat-card">
                    <h3>Total Facturas</h3>
                    <span id="total-invoices" class="stat-value">0</span>
                </div>
                <div class="stat-card">
                    <h3>Monto Total</h3>
                    <span id="total-amount" class="stat-value">$0.00</span>
                </div>
                <div class="stat-card">
                    <h3>Pendientes</h3>
                    <span id="pending-count" class="stat-value">0</span>
                </div>
            </div>
        </div>

        <div id="upload" class="tab">
            <h2>Subir Factura</h2>
            <div class="upload-area" id="drop-area">
                <p>Arrastra y suelta tu factura (PDF/IMG)</p>
                <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png,.webp" style="display: none;">
                <button onclick="document.getElementById('file-input').click()">Seleccionar Archivo</button>
            </div>
            <div id="upload-result"></div>
        </div>

        <div id="manual" class="tab">
            <h2>Carga Manual</h2>
            <form id="manual-form">
                <div class="form-group">
                    <label>Número de Factura</label>
                    <input type="text" name="nro_factura" required>
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" name="fecha" required>
                </div>
                <div class="form-group">
                    <label>Razón Social</label>
                    <input type="text" name="razon_social" required>
                </div>
                <div class="form-group">
                    <label>CUIT</label>
                    <input type="text" name="cuit" required>
                </div>
                <div class="form-group">
                    <label>Importe Neto</label>
                    <input type="number" step="0.01" name="importe_neto" required>
                </div>
                <div class="form-group">
                    <label>IVA 21%</label>
                    <input type="number" step="0.01" name="iva_21" required>
                </div>
                <div class="form-group">
                    <label>Total</label>
                    <input type="number" step="0.01" name="total" required>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select name="estado_pago">
                        <option value="pendiente">Pendiente</option>
                        <option value="pagada">Pagada</option>
                        <option value="parcial">Parcial</option>
                        <option value="vencida">Vencida</option>
                    </select>
                </div>
                <button type="submit">Guardar Factura</button>
            </form>
        </div>

        <div id="invoices" class="tab">
            <h2>Mis Facturas</h2>
            <div class="filters">
                <input type="text" id="search-input" placeholder="Buscar...">
                <button onclick="exportCSV()">Exportar CSV</button>
            </div>
            <table id="invoices-table">
                <thead>
                    <tr>
                        <th>N° Factura</th>
                        <th>Tipo</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="invoices-body"></tbody>
            </table>
        </div>

        <footer>
            <p>© 2026 Facturas AR - Sistema de procesamiento con IA</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
